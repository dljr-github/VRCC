name: Release

# Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build
# the Windows one-folder app and publish a GitHub release with the CPU and CUDA
# zips attached. A tag with a pre-release suffix (v0.1.0-rc1) publishes as a
# GitHub pre-release.
on:
  push:
    tags:
      - "v*"

# gh release create/upload needs write access to the repo's releases.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install system libraries (Qt offscreen + PortAudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1 libportaudio2
      - name: Install VRCC + pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest tests/ -q

  build:
    name: Build ${{ matrix.zip }}
    needs: test
    runs-on: windows-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU-only build (smaller) and the CUDA build (bundles the cuBLAS +
          # cuDNN runtime wheels), matching the two zips the README documents.
          - extras: dev
            zip: VRCC-windows-x64
          - extras: dev,cuda
            zip: VRCC-cuda-windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install VRCC + build tools (${{ matrix.zip }})
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[${{ matrix.extras }}]"
      - name: Overlay onnxruntime-gpu (CUDA zip only)
        # onnxruntime-gpu shares the `onnxruntime` import name with the CPU
        # wheel faster-whisper depends on, so it must be installed LAST, as
        # its own step, for its CUDA-enabled binaries to win the file overlap
        # deterministically. Safe here because this env is frozen into the
        # zip right after and never upgraded. Gives Parakeet GPU captions;
        # CTranslate2 (whisper models) has its own CUDA path.
        # <1.23: newer onnxruntime-gpu builds are CUDA 13, but the [cuda]
        # extra ships the CUDA 12 runtime wheels (CTranslate2 needs them);
        # mismatched builds silently fall back to CPU sessions.
        if: matrix.zip == 'VRCC-cuda-windows-x64'
        run: python -m pip install "onnxruntime-gpu>=1.21,<1.23"
      - name: Build the one-folder app
        # Same invocation the README documents; produces dist/VRCC/VRCC.exe.
        run: pyinstaller packaging/vrcc.spec --noconfirm --distpath dist
      - name: Package ${{ matrix.zip }}.zip
        shell: pwsh
        # Archive the whole dist/VRCC folder so it unzips to a VRCC/ directory
        # with VRCC.exe inside, as the README's "distribute the whole folder"
        # instructions expect.
        run: Compress-Archive -Path dist/VRCC -DestinationPath "${{ matrix.zip }}.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip }}
          path: ${{ matrix.zip }}.zip
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built zips
        uses: actions/download-artifact@v4
        with:
          path: dist-zips
          merge-multiple: true
      - name: Create or update the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          # A SemVer pre-release suffix (v1.2.3-rc1, -beta, ...) → pre-release.
          prerelease=""
          case "$tag" in *-*) prerelease="--prerelease" ;; esac
          # Idempotent: re-running the workflow re-uploads assets to the same
          # release instead of failing because the tag's release already exists.
          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" dist-zips/*.zip --repo "$repo" --clobber
          else
            gh release create "$tag" dist-zips/*.zip \
              --repo "$repo" \
              --title "$tag" \
              --generate-notes \
              $prerelease
          fi
