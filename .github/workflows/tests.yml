name: Tests

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu is the cheap fast leg: the Python floor and a current one.
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.12"
          # Windows is the platform VRCC actually ships on.
          - os: windows-latest
            python: "3.12"
    env:
      # GUI tests build real widgets; render offscreen (no display on runners).
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system libraries (Qt offscreen + PortAudio)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1 \
            libportaudio2

      - name: Install VRCC + pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # pyproject's addopts already deselect the integration marker, so this
      # is the pure unit suite: no model downloads, no network, no audio HW.
      - name: Run unit tests
        run: python -m pytest tests/ -v
